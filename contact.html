<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Sooner Response Photography</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@700&display=swap');
        body { font-family: 'Inter', system_ui, sans-serif; }
        h1, h2, h3 { font-family: 'Playfair Display', sans-serif; }
    </style>
</head>
<body class="bg-zinc-950 text-white">
    <!-- Navbar (same as before) -->
    <nav class="fixed top-0 w-full bg-zinc-950/95 backdrop-blur-md z-50 border-b border-zinc-800">
        <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="w-9 h-9 bg-gradient-to-br from-red-600 to-blue-600 rounded-2xl flex items-center justify-center">
                    <i class="fas fa-camera text-white text-xl"></i>
                </div>
                <span class="text-2xl font-bold tracking-tighter">Sooner Response</span>
            </div>
            <div class="hidden md:flex items-center space-x-8 text-sm uppercase tracking-widest font-medium">
                <a href="index.html" class="hover:text-red-500 transition-colors">Home</a>
                <a href="gallery.html" class="hover:text-red-500 transition-colors">Gallery</a>
                <a href="services.html" class="hover:text-red-500 transition-colors">Services</a>
                <a href="about.html" class="hover:text-red-500 transition-colors">About</a>
                <a href="contact.html" class="hover:text-red-500 transition-colors">Contact</a>
            </div>
            <a href="contact.html" class="px-6 py-3 bg-gradient-to-r from-red-600 to-blue-600 rounded-full font-medium hover:brightness-110 transition-all">
                Book a Shoot
            </a>
        </div>
    </nav>

    <section class="pt-24 pb-20">
        <div class="max-w-2xl mx-auto px-6">
            <div class="text-center mb-12">
                <h1 class="text-5xl font-bold tracking-tighter">Let's Work Together</h1>
                <p class="text-zinc-400 mt-4">Ready to document your agency's important moments?</p>
            </div>

            <form id="contact-form" class="space-y-6 bg-zinc-900 p-10 rounded-3xl">
                <div>
                    <label class="block text-sm uppercase tracking-widest mb-2">Your Name</label>
                    <input type="text" name="name" required class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-6 py-4 focus:outline-none focus:border-red-500">
                </div>
                <div>
                    <label class="block text-sm uppercase tracking-widest mb-2">Agency / Organization</label>
                    <input type="text" name="agency" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-6 py-4 focus:outline-none focus:border-red-500">
                </div>
                <div>
                    <label class="block text-sm uppercase tracking-widest mb-2">Email</label>
                    <input type="email" name="email" required class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-6 py-4 focus:outline-none focus:border-red-500">
                </div>
                <div>
                    <label class="block text-sm uppercase tracking-widest mb-2">Message / Project Details</label>
                    <textarea name="message" rows="6" required class="w-full bg-zinc-800 border border-zinc-700 rounded-3xl px-6 py-4 focus:outline-none focus:border-red-500"></textarea>
                </div>
                <button type="submit" id="submit-btn" 
                        class="w-full py-5 bg-gradient-to-r from-red-600 to-blue-600 rounded-2xl font-semibold text-lg hover:brightness-110 transition-all">
                    Send Message
                </button>
            </form>

            <div class="mt-12 flex flex-col md:flex-row gap-8 justify-center text-center">
                <a href="https://www.facebook.com/profile.php?id=61590723851659" target="_blank" class="flex items-center justify-center gap-3 hover:text-red-500"><i class="fab fa-facebook text-2xl"></i> Facebook</a>
                <a href="https://www.instagram.com/soonerresponsepics" target="_blank" class="flex items-center justify-center gap-3 hover:text-red-500"><i class="fab fa-instagram text-2xl"></i> Instagram</a>
                <a href="https://www.tiktok.com/@soonerresponse" target="_blank" class="flex items-center justify-center gap-3 hover:text-red-500"><i class="fab fa-tiktok text-2xl"></i> TikTok</a>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
